version: "3.8"

services:
  astro:
    container_name: astro-portfolio
    image: ${ASTRO_IMAGE:-ghcr.io/vivinkv6/astro-portfolio:latest}
    restart: unless-stopped

    expose:
      - "80"

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
