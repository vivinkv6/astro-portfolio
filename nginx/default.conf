# ── Global Gzip Settings ──────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

server {
    listen 80 default_server;
    server_name _;

    # Clean redirects behind Coolify / Traefik TLS termination
    absolute_redirect  off;
    port_in_redirect   off;
    server_tokens      off;

    # Prevents nginx collapsing //double/slashes before try_files sees them
    merge_slashes off;

    charset utf-8;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ──────────────────────────────────────────────────────
    # Included at the server level so they apply to all locations
    include /etc/nginx/conf.d/security_headers.conf;

    # ── Error pages ────────────────────────────────────────────────────────────
    error_page 404             /404.html;
    error_page 500 502 503 504 /50x.html;

    # ── Health check ───────────────────────────────────────────────────────────
    location = /health {
        access_log  off;
        default_type text/plain;
        return 200 'OK';
    }

    # ── Root ───────────────────────────────────────────────────────────────────
    location = / {
        try_files /index.html =404;
    }

    # ── Astro hashed assets ────────────────────────────────────────────────────
    location ^~ /_astro/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        # Re-include security headers because add_header in a child block 
        # clears parent add_header directives
        include /etc/nginx/conf.d/security_headers.conf;
        try_files $uri =404;
    }

    # ── Other static assets ────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|avif|woff|woff2|txt|xml|map)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        include /etc/nginx/conf.d/security_headers.conf;
        try_files $uri =404;
    }

    # ── All other routes ───────────────────────────────────────────────────────
    location / {
        try_files $uri/index.html $uri.html $uri =404;
    }

    # ── Internal error page locations ──────────────────────────────────────────
    # FIXED: Added required semicolons inside the braces
    location = /404.html { internal; }
    location = /50x.html { internal; }
}

