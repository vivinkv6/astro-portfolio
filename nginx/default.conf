gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

server {
    listen 80 default_server;
    server_name _;

    absolute_redirect  off;
    port_in_redirect   off;
    server_tokens      off;
    merge_slashes      off;

    charset utf-8;
    root  /usr/share/nginx/html;
    index index.html;

    error_page 404             /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /health {
        access_log  off;
        default_type text/plain;
        return 200 'OK';
    }

    # Astro hashed assets
    location ^~ /_astro/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        include /etc/nginx/conf.d/security_headers.conf;
        try_files $uri =404;
    }

    # Static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|avif|woff|woff2|txt|xml|map)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        include /etc/nginx/conf.d/security_headers.conf;
        try_files $uri =404;
    }

    # Main Router - Clean URLs (No trailing slash)
    location / {
        include /etc/nginx/conf.d/security_headers.conf;
        # Check for .html version first to prevent directory redirect
        try_files $uri.html $uri/index.html $uri =404;
    }

    location = /404.html { internal; }
    location = /50x.html { internal; }
}

