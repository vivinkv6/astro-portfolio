# nginx.conf — place at /etc/nginx/conf.d/default.conf inside the container.
# nginx:alpine's base config wraps conf.d/*.conf inside http{}, so gzip
# directives here are valid (they're in http context after include).

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

server {
    listen 80 default_server;
    server_name _;

    # Clean redirects behind Coolify / Traefik TLS termination
    absolute_redirect  off;
    port_in_redirect   off;
    server_tokens      off;

    # Prevents nginx collapsing //double/slashes before try_files sees them
    merge_slashes off;

    charset utf-8;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Error pages ────────────────────────────────────────────────────────────
    # /404.html  — generated by Astro automatically.
    # /50x.html  — ships with nginx:alpine at /usr/share/nginx/html/50x.html.
    #              Add public/50x.html to your repo to customise it.
    error_page 404             /404.html;
    error_page 500 502 503 504 /50x.html;

    # ── Health check ───────────────────────────────────────────────────────────
    # IMPORTANT: in nginx, `return` is a terminal directive — any add_header or
    # include placed AFTER return in the same block is silently ignored.
    # All headers must appear BEFORE the return statement.
    # We use default_type to set Content-Type (works correctly with return).
    location = /health {
        access_log  off;
        default_type text/plain;
        include /etc/nginx/conf.d/security_headers.conf;
        return 200 'OK';
    }

    # ── Root ───────────────────────────────────────────────────────────────────
    location = / {
        include /etc/nginx/conf.d/security_headers.conf;
        try_files /index.html =404;
    }

    # ── Astro hashed assets ────────────────────────────────────────────────────
    # ^~ prefix beats the regex location — no double evaluation.
    # Content-hashed filenames make 1y immutable safe.
    location ^~ /_astro/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        include /etc/nginx/conf.d/security_headers.conf;
        try_files $uri =404;
    }

    # ── Other static assets ────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|avif|woff|woff2|txt|xml|map)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        include /etc/nginx/conf.d/security_headers.conf;
        try_files $uri =404;
    }

    # ── All other routes ───────────────────────────────────────────────────────
    # try_files order for Astro static output:
    #   1. $uri/index.html  — directory-style pages (/about → /about/index.html)
    #   2. $uri.html        — flat pages (trailingSlash: 'never' mode)
    #   3. $uri             — exact file match
    #   4. =404             — hard 404; never silently fall back to homepage
    location / {
        include /etc/nginx/conf.d/security_headers.conf;
        try_files $uri/index.html $uri.html $uri =404;
    }

    # ── Internal error page locations ──────────────────────────────────────────
    # No add_header here — these inherit from server{} safely (no child override).
    location = /404.html { internal }
    location = /50x.html { internal }
}