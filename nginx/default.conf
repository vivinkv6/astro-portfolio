server {
  listen 80 default_server;
  server_name _;
  absolute_redirect off;
  port_in_redirect off;
  server_tokens off;
  charset utf-8;

  root /usr/share/nginx/html;
  index index.html;

  error_page 404 /404.html;
  error_page 500 502 503 504 /500.html;

  location = /health {
    access_log off;
    try_files /health =404;
  }

  location / {
    try_files $uri $uri.html =404;
  }

  location = /404.html {
    internal;
  }

  location = /500.html {
    internal;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|avif|woff|woff2|txt|xml|map)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
